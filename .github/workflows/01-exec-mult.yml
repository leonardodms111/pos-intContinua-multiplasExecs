name: CI - Testes Automatizados

on:
  push:
    branches:
      - main
      - develop

  workflow_dispatch:

  schedule:
    - cron: '0 8 * * 1-5' # Segunda a sexta às 08:00 UTC

defaults:
  run:
    shell: cmd

jobs:
  e2e-tests:

    runs-on:
      - self-hosted
      - windows
      - x64

    steps:

      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes (Mocha)
        run: npm test

      - name: Publicar artefatos de teste
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mocha-report
          path: test-results/
          retention-days: 30